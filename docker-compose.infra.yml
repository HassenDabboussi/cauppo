name: cauppo-infra

services:
  postgres:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d postgres
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - cauppo-internal

  redis:
    image: redis:8.6.1-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
      - --requirepass
      - cauppo_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - cauppo_redis
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
    networks:
      - cauppo-internal

  rabbitmq:
    image: rabbitmq:4.2.5-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: cauppo
      RABBITMQ_DEFAULT_PASS: cauppo
      RABBITMQ_DEFAULT_VHOST: /cauppo
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    networks:
      - cauppo-internal

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --ping
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://host.docker.internal:2375
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=cauppo-edge
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
      # secure-headers is NOT a global middleware — it must be applied per-router.
      # Entrypoint middlewares run LAST on responses (outermost wrapper), so a global
      # secure-headers would re-apply CSP AFTER any router-level header clearing.
      # zitadel-login uses zitadel-login-headers@file instead; all others use secure-headers@file.
      - --entrypoints.web.http.middlewares=compress@file,rate-limit@file
      - --log.level=INFO
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:8090:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    networks:
      cauppo-edge: {}
      # Alias so zitadel-login can reach Traefik by the external domain name.
      # This makes Host: auth.cauppo.localhost natively correct without needing
      # CUSTOM_REQUEST_HEADERS (which Node.js http2 silently drops).
      cauppo-internal:
        aliases:
          - auth.cauppo.localhost

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.12.3
    restart: unless-stopped
    # user: "0" required — zitadel needs write access to the PAT volume; non-root uid cannot write /current-dir/login-client.pat.
    user: "0"
    command:
      - start-from-init
      - --masterkey
      - ${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}
    environment:
      ZITADEL_PORT: "8080"
      ZITADEL_EXTERNALDOMAIN: auth.cauppo.localhost
      ZITADEL_EXTERNALPORT: "80"
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_FIRSTINSTANCE_ORG_NAME: Cauppo
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Admin1234!
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /current-dir/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Automatically Initialized IAM_LOGIN_CLIENT
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2029-01-01T00:00:00Z"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://auth.cauppo.localhost/ui/v2/login
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://auth.cauppo.localhost/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://auth.cauppo.localhost/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: "true"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - zitadel-pat:/current-dir
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /app/zitadel
        - ready
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=cauppo-internal"
      - "traefik.http.routers.zitadel.rule=Host(`auth.cauppo.localhost`) && !PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.zitadel.entrypoints=web"
      - "traefik.http.routers.zitadel.priority=10"
      - "traefik.http.routers.zitadel.middlewares=secure-headers@file"
      - "traefik.http.services.zitadel.loadbalancer.server.port=8080"
      - "traefik.http.services.zitadel.loadbalancer.server.scheme=h2c"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - cauppo-internal

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.12.3
    restart: unless-stopped
    environment:
      # Route via Traefik so Host: auth.cauppo.localhost is set natively from the URL.
      # zitadel-login resolves auth.cauppo.localhost to Traefik (alias on cauppo-internal),
      # Traefik routes to Zitadel via h2c. No CUSTOM_REQUEST_HEADERS needed.
      ZITADEL_API_URL: http://auth.cauppo.localhost
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /current-dir/login-client.pat
      NODE_ENV: production
    volumes:
      - zitadel-pat:/current-dir:ro
    depends_on:
      zitadel:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/ui/v2/login/healthy || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=cauppo-internal"
      - "traefik.http.routers.zitadel-login.rule=Host(`auth.cauppo.localhost`) && PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.zitadel-login.entrypoints=web"
      - "traefik.http.routers.zitadel-login.priority=20"
      # Override global entrypoint middlewares: replace secure-headers with zitadel-login-headers
      # so the Traefik CSP does not block Next.js inline scripts on the login UI.
      - "traefik.http.routers.zitadel-login.middlewares=compress@file,zitadel-login-headers@file,rate-limit@file"
      - "traefik.http.services.zitadel-login.loadbalancer.server.port=3000"
    networks:
      - cauppo-internal

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -f http://127.0.0.1:9000/minio/health/live || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=cauppo-internal"
      - "traefik.http.routers.minio-console.rule=Host(`minio.cauppo.localhost`)"
      - "traefik.http.routers.minio-console.entrypoints=web"
      - "traefik.http.routers.minio-console.middlewares=secure-headers@file"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    networks:
      - cauppo-internal

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
        /usr/bin/mc mb --ignore-existing local/cauppo-avatars;
        /usr/bin/mc mb --ignore-existing local/cauppo-restaurants;
        /usr/bin/mc mb --ignore-existing local/cauppo-assets;
        /usr/bin/mc mb --ignore-existing local/cauppo-menu-items;
        /usr/bin/mc mb --ignore-existing local/cauppo-qr;
        /usr/bin/mc anonymous set download local/cauppo-avatars;
        /usr/bin/mc anonymous set download local/cauppo-menu-items;
        /usr/bin/mc anonymous set download local/cauppo-qr;
        echo 'MinIO buckets initialized';
        exit 0;
      "
    networks:
      - cauppo-internal
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_UI_AUTH: mailpit:cauppo-mailpit
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8025/livez || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64m
    networks:
      - cauppo-edge
      - cauppo-internal

networks:
  cauppo-edge:
    driver: bridge
    name: cauppo-edge
  cauppo-internal:
    driver: bridge
    name: cauppo-internal

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  zitadel-pat:
  minio-data: