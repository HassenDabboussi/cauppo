# Repo-root direct-compose still uses this full shared graph definition for the
# two committed env files, but Sprint 12b Task 2.1 makes isolated-test the only
# active repo-root suite and runtime lane. Release development occupancy before
# starting isolated-test, and do not run the two lanes in parallel.
services:
  postgres:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_POSTGRES}:5432"
    volumes:
      # PostgreSQL 18 stores the live cluster under /var/lib/postgresql/18/docker.
      - postgres-data:/var/lib/postgresql/18/docker
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      - ./menu-service/migrations:/docker-entrypoint-initdb.d/menu-service-migrations:ro
      - ./order-service/migrations:/docker-entrypoint-initdb.d/order-service-migrations:ro
      - ./analytics-service/migrations:/docker-entrypoint-initdb.d/analytics-service-migrations:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d postgres
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - cauppo-internal

  redis:
    image: redis:8.6.1-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
      - --requirepass
      - ${REDIS_PASSWORD}
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_REDIS}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - ${REDIS_PASSWORD}
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
    networks:
      - cauppo-internal

  rabbitmq:
    image: rabbitmq:4.2.5-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_RABBITMQ}:5672"
        - "127.0.0.1:${CAUPPO_HOST_PORT_RABBITMQ_MANAGEMENT}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    networks:
      - cauppo-internal

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --ping
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://host.docker.internal:2375
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${CAUPPO_COMPOSE_EDGE_NETWORK}
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
      # secure-headers is NOT a global middleware — it must be applied per-router.
      # Entrypoint middlewares run LAST on responses (outermost wrapper), so a global
      # secure-headers would re-apply CSP AFTER any router-level header clearing.
      - --entrypoints.web.http.middlewares=compress@file,rate-limit@file
      - --log.level=INFO
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "127.0.0.1:${CAUPPO_HOST_PORT_TRAEFIK_WEB}:80"
      - "127.0.0.1:${CAUPPO_HOST_PORT_TRAEFIK_DASHBOARD}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    networks:
      cauppo-edge: {}
      cauppo-internal:
        aliases:
          - auth.cauppo.localhost

  zitadel-db-ready:
    image: postgres:18.3-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
      CAUPPO_ENV_PROVENANCE: ${CAUPPO_ENV_PROVENANCE}
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DATABASE_POSTGRES_DATABASE}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until psql "postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable" -c 'select 1' >/dev/null 2>&1; do
          echo 'waiting for postgres to accept SQL connections for zitadel bootstrap'
          sleep 1
        done

        table_count="$$(psql "postgresql://postgres:postgres@postgres:5432/$${ZITADEL_DATABASE_POSTGRES_DATABASE}?sslmode=disable" -Atc "select count(*) from information_schema.tables where table_schema not in ('pg_catalog', 'information_schema')")"
        pat_file="/var/run/cauppo-auth/iam-login-client.$${CAUPPO_ENV_PROVENANCE}.pat"

        if [ "$${table_count:-0}" = "0" ]; then
          if [ -e "$${pat_file}" ]; then
            rm -rf "$${pat_file}"
            echo "removed stale Zitadel login-client PAT before fresh $${CAUPPO_ENV_PROVENANCE} init"
          fi
        fi

        touch /tmp/cauppo-init-ready
        tail -f /dev/null
    networks:
      - cauppo-internal
    volumes:
      - type: bind
        source: ./envs/.local/${CAUPPO_ENV_PROVENANCE}
        target: /var/run/cauppo-auth
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/cauppo-init-ready
      interval: 5s
      timeout: 2s
      retries: 120
      start_period: 5s
    restart: "no"

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.12.3
    restart: unless-stopped
    user: "0"
    command:
      - start-from-init
      - --masterkey
      - "${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}"
    environment:
      ZITADEL_PORT: "8080"
      ZITADEL_EXTERNALDOMAIN: auth.cauppo.localhost
      ZITADEL_EXTERNALPORT: "${ZITADEL_EXTERNALPORT}"
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DATABASE_POSTGRES_DATABASE}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_FIRSTINSTANCE_ORG_NAME: Cauppo
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Admin1234!
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /var/run/cauppo-auth/iam-login-client.${CAUPPO_ENV_PROVENANCE}.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2099-01-01T00:00:00Z"
      # Login v2 feature flags
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: "true"
    volumes:
      - type: bind
        source: ./envs/.local/${CAUPPO_ENV_PROVENANCE}
        target: /var/run/cauppo-auth
    ports:
      - "127.0.0.1:${CAUPPO_HOST_PORT_ZITADEL}:8080"
    depends_on:
      zitadel-db-ready:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /app/zitadel
        - ready
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${CAUPPO_COMPOSE_INTERNAL_NETWORK}"
      - "traefik.http.routers.zitadel.rule=Host(`auth.cauppo.localhost`)"
      - "traefik.http.routers.zitadel.entrypoints=web"
      - "traefik.http.routers.zitadel.priority=10"
      - "traefik.http.routers.zitadel.middlewares=secure-headers@file"
      - "traefik.http.services.zitadel.loadbalancer.server.port=8080"
      - "traefik.http.services.zitadel.loadbalancer.server.scheme=h2c"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - cauppo-internal

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.12.3
    restart: unless-stopped
    user: "0"
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /var/run/cauppo-auth/iam-login-client.${CAUPPO_ENV_PROVENANCE}.pat
      CUSTOM_REQUEST_HEADERS: Host:auth.cauppo.localhost,X-Forwarded-Proto:http
    volumes:
      - type: bind
        source: ./envs/.local/${CAUPPO_ENV_PROVENANCE}
        target: /var/run/cauppo-auth
        read_only: true
    depends_on:
      zitadel:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - /bin/sh
        - -c
        - node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${CAUPPO_COMPOSE_INTERNAL_NETWORK}"
      - "traefik.http.routers.zitadel-login.rule=Host(`auth.cauppo.localhost`) && PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.zitadel-login.entrypoints=web"
      - "traefik.http.routers.zitadel-login.priority=20"
      - "traefik.http.routers.zitadel-login.middlewares=zitadel-login-headers@file"
      - "traefik.http.services.zitadel-login.loadbalancer.server.port=3000"
    networks:
      - cauppo-internal

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${USER_SERVICE_PORT}
      NODE_ENV: ${NODE_ENV}
      CAUPPO_ENV: ${CAUPPO_ENV}
      CAUPPO_ENV_PROVENANCE: ${CAUPPO_ENV_PROVENANCE}
      CAUPPO_TEST_ENV_APPROVED: ${CAUPPO_TEST_ENV_APPROVED}
      CAUPPO_TEST_EXECUTION_MODE: compose-backed
      CAUPPO_TRACE_HEADER: ${CAUPPO_TRACE_HEADER}
      DATABASE_URL: ${USER_SERVICE_DATABASE_URL}
      REDIS_URL: ${USER_SERVICE_REDIS_URL}
      RABBITMQ_URL: ${USER_SERVICE_RABBITMQ_URL}
      ZITADEL_API_URL: ${USER_SERVICE_ZITADEL_API_URL}
      ZITADEL_INTERNAL_URL: ${USER_SERVICE_ZITADEL_INTERNAL_URL}
      ZITADEL_LOGIN_CLIENT_PAT_FILE: /var/run/cauppo-auth/iam-login-client.${CAUPPO_ENV_PROVENANCE}.pat
      ZITADEL_ISSUER: ${USER_SERVICE_ZITADEL_ISSUER}
      ZITADEL_ISSUER_URL: ${USER_SERVICE_ZITADEL_ISSUER_URL}
      ZITADEL_JWKS_URL: ${USER_SERVICE_ZITADEL_JWKS_URL}
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID}
      ZITADEL_SHARED_PROJECT_ID: ${ZITADEL_SHARED_PROJECT_ID}
      ZITADEL_SHARED_PROJECT_AUDIENCE: ${ZITADEL_SHARED_PROJECT_AUDIENCE}
      ZITADEL_SHARED_PROJECT_AUDIENCE_SCOPE: ${ZITADEL_SHARED_PROJECT_AUDIENCE_SCOPE}
      ZITADEL_AUDIENCE: ${USER_SERVICE_ZITADEL_AUDIENCE}
      JWT_AUDIENCE: ${USER_SERVICE_JWT_AUDIENCE}
      ZITADEL_OIDC_CLIENT_ID: ${USER_SERVICE_ZITADEL_OIDC_CLIENT_ID}
      ZITADEL_CLIENT_ID: ${USER_SERVICE_ZITADEL_CLIENT_ID}
      ZITADEL_CLIENT_SECRET: ${USER_SERVICE_ZITADEL_CLIENT_SECRET}
      ZITADEL_MANAGEMENT_CLIENT_ID: ${USER_SERVICE_ZITADEL_MANAGEMENT_CLIENT_ID}
      ZITADEL_MANAGEMENT_CLIENT_SECRET: ${USER_SERVICE_ZITADEL_MANAGEMENT_CLIENT_SECRET}
      RESEND_API_KEY: ${USER_SERVICE_RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${USER_SERVICE_RESEND_FROM_EMAIL}
      SMTP_HOST: ${USER_SERVICE_SMTP_HOST}
      SMTP_PORT: ${USER_SERVICE_SMTP_PORT}
      SMTP_SECURE: ${USER_SERVICE_SMTP_SECURE}
      R2_ENDPOINT: ${USER_SERVICE_R2_ENDPOINT}
      R2_ACCOUNT_ID: ${USER_SERVICE_R2_ACCOUNT_ID}
      R2_BUCKET_AVATARS: ${USER_SERVICE_R2_BUCKET_AVATARS}
      R2_BUCKET_RESTAURANTS: ${USER_SERVICE_R2_BUCKET_RESTAURANTS}
      R2_BUCKET_NAME: ${USER_SERVICE_R2_BUCKET_NAME}
      R2_ACCESS_KEY_ID: ${USER_SERVICE_R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${USER_SERVICE_R2_SECRET_ACCESS_KEY}
      R2_PUBLIC_URL: ${USER_SERVICE_R2_PUBLIC_URL}
      KONNECT_API_KEY: ${USER_SERVICE_KONNECT_API_KEY}
      KONNECT_WEBHOOK_SECRET: ${USER_SERVICE_KONNECT_WEBHOOK_SECRET}
      CAUPPO_PUBLIC_APP_URL: ${USER_SERVICE_CAUPPO_PUBLIC_APP_URL}
    volumes:
      - type: bind
        source: ./envs/.local/${CAUPPO_ENV_PROVENANCE}
        target: /var/run/cauppo-auth
        read_only: true
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_USER_SERVICE}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      user-service-db-init:
        condition: service_healthy
      traefik:
        condition: service_healthy
      zitadel:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      zitadel-mailpit-smtp-init:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:$$PORT/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    labels:
      - "traefik.enable=true"
      # Public /v1/auth/* stays on user-service. Internal auth helpers remain private.
      - "traefik.http.routers.user-service.rule=Host(`api.cauppo.localhost`) && (PathPrefix(`/v1/auth`) || PathPrefix(`/v1/customer`) || PathPrefix(`/v1/profile`) || PathPrefix(`/v1/roles`) || PathPrefix(`/v1/invitations`) || PathPrefix(`/v1/manager/staff`) || PathPrefix(`/v1/manager/restaurant`) || PathPrefix(`/v1/owner`) || PathPrefix(`/v1/webhooks`))"
      - "traefik.http.routers.user-service.entrypoints=web"
      - "traefik.http.routers.user-service.priority=10"
      - "traefik.http.routers.user-service.middlewares=secure-headers@file"
      - "traefik.http.services.user-service.loadbalancer.server.port=3001"
    networks:
      - cauppo-edge
      - cauppo-internal

  user-service-db-init:
    image: oven/bun:1.3.11-alpine
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace/user-service
    environment:
      NODE_ENV: ${NODE_ENV}
      CAUPPO_ENV: ${CAUPPO_ENV}
      CAUPPO_ENV_PROVENANCE: ${CAUPPO_ENV_PROVENANCE}
      CAUPPO_TEST_ENV_APPROVED: ${CAUPPO_TEST_ENV_APPROVED}
      CAUPPO_TRACE_HEADER: ${CAUPPO_TRACE_HEADER}
      DATABASE_URL: ${USER_SERVICE_DATABASE_URL}
      REDIS_URL: ${USER_SERVICE_REDIS_URL}
      RABBITMQ_URL: ${USER_SERVICE_RABBITMQ_URL}
      ZITADEL_API_URL: ${USER_SERVICE_ZITADEL_API_URL}
      ZITADEL_INTERNAL_URL: ${USER_SERVICE_ZITADEL_INTERNAL_URL}
      ZITADEL_ISSUER: ${USER_SERVICE_ZITADEL_ISSUER}
      ZITADEL_ISSUER_URL: ${USER_SERVICE_ZITADEL_ISSUER_URL}
      ZITADEL_JWKS_URL: ${USER_SERVICE_ZITADEL_JWKS_URL}
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID}
      ZITADEL_SHARED_PROJECT_ID: ${ZITADEL_SHARED_PROJECT_ID}
      ZITADEL_SHARED_PROJECT_AUDIENCE: ${ZITADEL_SHARED_PROJECT_AUDIENCE}
      ZITADEL_SHARED_PROJECT_AUDIENCE_SCOPE: ${ZITADEL_SHARED_PROJECT_AUDIENCE_SCOPE}
      ZITADEL_AUDIENCE: ${USER_SERVICE_ZITADEL_AUDIENCE}
      JWT_AUDIENCE: ${USER_SERVICE_JWT_AUDIENCE}
      ZITADEL_OIDC_CLIENT_ID: ${USER_SERVICE_ZITADEL_OIDC_CLIENT_ID}
      ZITADEL_CLIENT_ID: ${USER_SERVICE_ZITADEL_CLIENT_ID}
      ZITADEL_CLIENT_SECRET: ${USER_SERVICE_ZITADEL_CLIENT_SECRET}
      ZITADEL_MANAGEMENT_CLIENT_ID: ${USER_SERVICE_ZITADEL_MANAGEMENT_CLIENT_ID}
      ZITADEL_MANAGEMENT_CLIENT_SECRET: ${USER_SERVICE_ZITADEL_MANAGEMENT_CLIENT_SECRET}
      RESEND_API_KEY: ${USER_SERVICE_RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${USER_SERVICE_RESEND_FROM_EMAIL}
      R2_ENDPOINT: ${USER_SERVICE_R2_ENDPOINT}
      R2_ACCOUNT_ID: ${USER_SERVICE_R2_ACCOUNT_ID}
      R2_BUCKET_AVATARS: ${USER_SERVICE_R2_BUCKET_AVATARS}
      R2_BUCKET_RESTAURANTS: ${USER_SERVICE_R2_BUCKET_RESTAURANTS}
      R2_BUCKET_NAME: ${USER_SERVICE_R2_BUCKET_NAME}
      R2_ACCESS_KEY_ID: ${USER_SERVICE_R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${USER_SERVICE_R2_SECRET_ACCESS_KEY}
      R2_PUBLIC_URL: ${USER_SERVICE_R2_PUBLIC_URL}
      KONNECT_API_KEY: ${USER_SERVICE_KONNECT_API_KEY}
      KONNECT_WEBHOOK_SECRET: ${USER_SERVICE_KONNECT_WEBHOOK_SECRET}
      CAUPPO_PUBLIC_APP_URL: ${USER_SERVICE_CAUPPO_PUBLIC_APP_URL}
    entrypoint: >
      /bin/sh -ec "
        mkdir -p /workspace/user-service;
          tar -C /source -cf - package.json bun.lock bunfig.toml tsconfig.json drizzle.config.ts src migrations | tar -C /workspace/user-service -xf -;
        bun install;
        bun run db:migrate;
        echo 'user-service schema initialized';
        touch /tmp/cauppo-init-ready;
        tail -f /dev/null;
      "
    volumes:
      - ./user-service:/source:ro
    networks:
      - cauppo-internal
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/cauppo-init-ready
      interval: 5s
      timeout: 2s
      retries: 120
      start_period: 5s
    restart: "no"

  feedback-service:
    build:
      context: ./feedback-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${FEEDBACK_SERVICE_PORT}
      NODE_ENV: ${NODE_ENV}
      CAUPPO_ENV: ${CAUPPO_ENV}
      CAUPPO_ENV_PROVENANCE: ${CAUPPO_ENV_PROVENANCE}
      CAUPPO_TEST_ENV_APPROVED: ${CAUPPO_TEST_ENV_APPROVED}
      CAUPPO_TRACE_HEADER: ${CAUPPO_TRACE_HEADER}
      DATABASE_URL: ${FEEDBACK_SERVICE_DATABASE_URL}
      REDIS_URL: ${FEEDBACK_SERVICE_REDIS_URL}
      RABBITMQ_URL: ${FEEDBACK_SERVICE_RABBITMQ_URL}
      ZITADEL_ISSUER: ${FEEDBACK_SERVICE_ZITADEL_ISSUER}
      ZITADEL_ISSUER_URL: ${FEEDBACK_SERVICE_ZITADEL_ISSUER_URL}
      ZITADEL_JWKS_URL: ${FEEDBACK_SERVICE_ZITADEL_JWKS_URL}
      ZITADEL_AUDIENCE: ${FEEDBACK_SERVICE_ZITADEL_AUDIENCE}
      JWT_AUDIENCE: ${FEEDBACK_SERVICE_JWT_AUDIENCE}
      ZITADEL_CLIENT_ID: ${FEEDBACK_SERVICE_ZITADEL_CLIENT_ID}
      ORDER_SERVICE_INTERNAL_URL: ${FEEDBACK_SERVICE_ORDER_SERVICE_INTERNAL_URL}
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_FEEDBACK_SERVICE}:3002"
    depends_on:
      postgres:
        condition: service_healthy
      feedback-service-db-init:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:$$PORT/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.feedback-service.rule=Host(`api.cauppo.localhost`) && (PathPrefix(`/v1/feedback`) || PathPrefix(`/v1/customer/feedback`) || PathPrefix(`/v1/manager/feedback`) || PathPrefix(`/v1/owner/feedback`))"
      - "traefik.http.routers.feedback-service.entrypoints=web"
      - "traefik.http.routers.feedback-service.priority=20"
      - "traefik.http.routers.feedback-service.middlewares=secure-headers@file"
      - "traefik.http.services.feedback-service.loadbalancer.server.port=3002"
    networks:
      - cauppo-edge
      - cauppo-internal

  feedback-service-db-init:
    image: oven/bun:1.3.11-alpine
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace/feedback-service
    environment:
