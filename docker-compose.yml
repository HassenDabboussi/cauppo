  menu-service-db-init:
    image: postgres:18.3-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${MENU_SERVICE_DATABASE_URL}
    entrypoint: >
      /bin/sh -c "
        set -eu;
        wait_for_connection() {
          target=\"$$1\";
          label=\"$$2\";
          attempts=0;
          until psql \"$$target\" -v ON_ERROR_STOP=1 -c 'select 1' >/dev/null 2>&1; do
            attempts=$$((attempts + 1));
            if [ \"$$attempts\" -ge 30 ]; then
              echo \"Timed out waiting for $$label\";
              exit 1;
            fi;
            echo \"Waiting for $$label ($$attempts/30)\";
            sleep 2;
          done;
        }
        wait_for_connection \"$$DATABASE_URL\" \"menu-service database connection\";
        found=0;
        for migration in /migrations/*.sql; do
          [ -f \"$$migration\" ] || continue;
          found=1;
          echo \"Applying menu-service migration $$(basename \"$$migration\")\";
          psql \"$$DATABASE_URL\" -v ON_ERROR_STOP=1 -f \"$$migration\";
        done;
        if [ \"$$found\" -eq 0 ]; then
          echo 'menu-service migrations missing';
          exit 1;
        fi;
        echo 'menu-service schema initialized';
      "
    volumes:
      - ./menu-service/migrations:/migrations:ro
    networks:
      - cauppo-internal
    restart: "no"

