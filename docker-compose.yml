      ANALYTICS_SERVICE_ZITADEL_JWKS_URL: ${ANALYTICS_SERVICE_ZITADEL_JWKS_URL}
      ANALYTICS_SERVICE_ZITADEL_AUDIENCE: ${ANALYTICS_SERVICE_ZITADEL_AUDIENCE}
      ANALYTICS_SERVICE_JWT_AUDIENCE: ${ANALYTICS_SERVICE_JWT_AUDIENCE}
      DATABASE_URL: ${ANALYTICS_SERVICE_DATABASE_URL}
      ANALYTICS_READ_REPLICA_URL: ${ANALYTICS_SERVICE_ANALYTICS_READ_REPLICA_URL}
