# Repo-root direct-compose still uses this full shared graph definition for the
# two committed env files, but Sprint 12b Task 2.1 makes isolated-test the only
# active repo-root suite and runtime lane. Release development occupancy before
# starting isolated-test, and do not run the two lanes in parallel.
services:
  postgres:
    image: postgres:18.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_POSTGRES}:5432"
    volumes:
      # PostgreSQL 18 stores the live cluster under /var/lib/postgresql/18/docker.
      - postgres-data:/var/lib/postgresql/18/docker
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      - ./menu-service/migrations:/docker-entrypoint-initdb.d/menu-service-migrations:ro
      - ./order-service/migrations:/docker-entrypoint-initdb.d/order-service-migrations:ro
      - ./analytics-service/migrations:/docker-entrypoint-initdb.d/analytics-service-migrations:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d postgres
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - cauppo-internal

  redis:
    image: redis:8.6.1-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
      - --requirepass
      - ${REDIS_PASSWORD}
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_REDIS}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - ${REDIS_PASSWORD}
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
    networks:
      - cauppo-internal

  rabbitmq:
    image: rabbitmq:4.2.5-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_RABBITMQ}:5672"
        - "127.0.0.1:${CAUPPO_HOST_PORT_RABBITMQ_MANAGEMENT}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    networks:
      - cauppo-internal

  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - --api.insecure=true
      - --ping
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://host.docker.internal:2375
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${CAUPPO_COMPOSE_EDGE_NETWORK}
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
      # secure-headers is NOT a global middleware — it must be applied per-router.
      # Entrypoint middlewares run LAST on responses (outermost wrapper), so a global
      # secure-headers would re-apply CSP AFTER any router-level header clearing.
      # zitadel-login uses zitadel-login-headers@file instead; all others use secure-headers@file.
      - --entrypoints.web.http.middlewares=compress@file,rate-limit@file
      - --log.level=INFO
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "127.0.0.1:${CAUPPO_HOST_PORT_TRAEFIK_WEB}:80"
      - "127.0.0.1:${CAUPPO_HOST_PORT_TRAEFIK_DASHBOARD}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    networks:
      cauppo-edge: {}
      # Alias so zitadel-login can reach Traefik by the external domain name.
      # This makes Host: auth.cauppo.localhost natively correct without needing
      # CUSTOM_REQUEST_HEADERS (which Node.js http2 silently drops).
      cauppo-internal:
        aliases:
          - auth.cauppo.localhost

  zitadel-db-ready:
    image: postgres:18.3-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until psql "postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable" -c 'select 1' >/dev/null 2>&1; do
          echo 'waiting for postgres to accept SQL connections for zitadel bootstrap'
          sleep 1
        done
    networks:
      - cauppo-internal
    restart: "no"

  zitadel-development-state-guard:
    image: postgres:18.3-alpine
    depends_on:
      zitadel-db-ready:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: postgres
      CAUPPO_ENV_PROVENANCE: ${CAUPPO_ENV_PROVENANCE}
      CAUPPO_DEVELOPMENT_ZITADEL_STATE_MODE: ${CAUPPO_DEVELOPMENT_ZITADEL_STATE_MODE:-preserve-only}
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DATABASE_POSTGRES_DATABASE}
      USER_SERVICE_ZITADEL_LOGIN_CLIENT_PAT_FILE: ${USER_SERVICE_ZITADEL_LOGIN_CLIENT_PAT_FILE}
      IAM_LOGIN_CLIENT: ${IAM_LOGIN_CLIENT}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        if [ "$${CAUPPO_ENV_PROVENANCE}" != "development" ]; then
          echo "zitadel-development-state-guard: skipping non-development environment $${CAUPPO_ENV_PROVENANCE}"
          exit 0
        fi

        expected_pat_name="$(basename "$${IAM_LOGIN_CLIENT}")"
        runtime_pat_name="$(basename "$${USER_SERVICE_ZITADEL_LOGIN_CLIENT_PAT_FILE}")"

        if [ "$${expected_pat_name}" != "$${runtime_pat_name}" ]; then
          echo "zitadel-development-state-guard: IAM_LOGIN_CLIENT basename $${expected_pat_name} does not match runtime PAT $${runtime_pat_name}" >&2
          exit 1
        fi

        db_exists="$(psql "postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable" -Atc "select case when exists (select 1 from pg_database where datname = '$${ZITADEL_DATABASE_POSTGRES_DATABASE}') then 'yes' else 'no' end")"
        db_has_state="no"

        if [ "$${db_exists}" = "yes" ]; then
          db_has_state="$(psql "postgresql://postgres:postgres@postgres:5432/$${ZITADEL_DATABASE_POSTGRES_DATABASE}?sslmode=disable" -Atc "select case when exists (select 1 from projections.instances limit 1) then 'yes' else 'no' end" 2>/dev/null || printf 'no')"
        fi

        pat_exists="no"
        if [ -s "$${USER_SERVICE_ZITADEL_LOGIN_CLIENT_PAT_FILE}" ]; then
          pat_exists="yes"
        fi

        case "$${CAUPPO_DEVELOPMENT_ZITADEL_STATE_MODE}" in
          preserve-only)
            if [ "$${db_has_state}" = "yes" ] && [ "$${pat_exists}" = "yes" ]; then
              echo "zitadel-development-state-guard: preserved development Zitadel DB state and IAM_LOGIN_CLIENT artifact detected"
              exit 0
            fi

            if [ "$${db_has_state}" = "no" ] && [ "$${pat_exists}" = "no" ]; then
              echo "zitadel-development-state-guard: refusing implicit development reinit because both the Zitadel DB state and IAM_LOGIN_CLIENT artifact are absent; recover the matched pair or set CAUPPO_DEVELOPMENT_ZITADEL_STATE_MODE=allow-empty-init for an intentional rebuild" >&2
              exit 1
            fi

            echo "zitadel-development-state-guard: refusing development startup because the Zitadel DB state and IAM_LOGIN_CLIENT artifact no longer match; recover the matched development pair instead of allowing start-from-init to present a fresh state behind the same URL" >&2
            exit 1
            ;;
          allow-empty-init)
            if [ "$${db_has_state}" = "yes" ] && [ "$${pat_exists}" = "yes" ]; then
              echo "zitadel-development-state-guard: preserved development Zitadel DB state and IAM_LOGIN_CLIENT artifact detected"
              exit 0
            fi

            if [ "$${db_has_state}" = "no" ] && [ "$${pat_exists}" = "no" ]; then
              echo "zitadel-development-state-guard: operator approved intentional empty-state development init for this run"
              exit 0
            fi

            echo "zitadel-development-state-guard: refusing development startup because the Zitadel DB state and IAM_LOGIN_CLIENT artifact are inconsistent; intentional rebuild is allowed only when both are absent together" >&2
            exit 1
            ;;
          *)
            echo "zitadel-development-state-guard: unsupported CAUPPO_DEVELOPMENT_ZITADEL_STATE_MODE=$${CAUPPO_DEVELOPMENT_ZITADEL_STATE_MODE}" >&2
            exit 1
            ;;
        esac
    volumes:
      - type: bind
        source: ./envs/.local/${CAUPPO_ENV_PROVENANCE}
        target: /var/run/cauppo-auth
        read_only: true
    networks:
      - cauppo-internal
    restart: "no"

  zitadel-isolated-test-state-guard:
    image: postgres:18.3-alpine
    depends_on:
      zitadel-db-ready:
        condition: service_completed_successfully
    environment:
      PGPASSWORD: postgres
      CAUPPO_ENV_PROVENANCE: ${CAUPPO_ENV_PROVENANCE}
      CAUPPO_ISOLATED_TEST_ZITADEL_STATE_MODE: ${CAUPPO_ISOLATED_TEST_ZITADEL_STATE_MODE:-preserve-only}
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DATABASE_POSTGRES_DATABASE}
      USER_SERVICE_ZITADEL_LOGIN_CLIENT_PAT_FILE: ${USER_SERVICE_ZITADEL_LOGIN_CLIENT_PAT_FILE}
      IAM_LOGIN_CLIENT: ${IAM_LOGIN_CLIENT}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        if [ "$${CAUPPO_ENV_PROVENANCE}" != "isolated-test" ]; then
          echo "zitadel-isolated-test-state-guard: skipping non-isolated-test environment $${CAUPPO_ENV_PROVENANCE}"
          exit 0
        fi

        expected_pat_name="$(basename "$${IAM_LOGIN_CLIENT}")"
        runtime_pat_name="$(basename "$${USER_SERVICE_ZITADEL_LOGIN_CLIENT_PAT_FILE}")"

        if [ "$${expected_pat_name}" != "$${runtime_pat_name}" ]; then
          echo "zitadel-isolated-test-state-guard: IAM_LOGIN_CLIENT basename $${expected_pat_name} does not match runtime PAT $${runtime_pat_name}" >&2
          exit 1
        fi

        db_exists="$(psql "postgresql://postgres:postgres@postgres:5432/postgres?sslmode=disable" -Atc "select case when exists (select 1 from pg_database where datname = '$${ZITADEL_DATABASE_POSTGRES_DATABASE}') then 'yes' else 'no' end")"
        db_has_state="no"

        if [ "$${db_exists}" = "yes" ]; then
          db_has_state="$(psql "postgresql://postgres:postgres@postgres:5432/$${ZITADEL_DATABASE_POSTGRES_DATABASE}?sslmode=disable" -Atc "select case when exists (select 1 from projections.instances limit 1) then 'yes' else 'no' end" 2>/dev/null || printf 'no')"
        fi

        pat_exists="no"
        if [ -s "$${USER_SERVICE_ZITADEL_LOGIN_CLIENT_PAT_FILE}" ]; then
          pat_exists="yes"
        fi

        case "$${CAUPPO_ISOLATED_TEST_ZITADEL_STATE_MODE}" in
          preserve-only)
            if [ "$${db_has_state}" = "yes" ] && [ "$${pat_exists}" = "yes" ]; then
              echo "zitadel-isolated-test-state-guard: preserved isolated-test Zitadel DB state and IAM_LOGIN_CLIENT artifact detected"
              exit 0
            fi

            if [ "$${db_has_state}" = "no" ] && [ "$${pat_exists}" = "no" ]; then
              echo "zitadel-isolated-test-state-guard: refusing implicit isolated-test reinit because both the Zitadel DB state and IAM_LOGIN_CLIENT artifact are absent; recover the matched pair or set CAUPPO_ISOLATED_TEST_ZITADEL_STATE_MODE=allow-empty-init for an intentional isolated-test rebuild" >&2
              exit 1
            fi

            echo "zitadel-isolated-test-state-guard: refusing isolated-test startup because the Zitadel DB state and IAM_LOGIN_CLIENT artifact no longer match; recover the matched isolated-test pair instead of allowing start-from-init to present a fresh state behind the shared auth URL" >&2
            exit 1
            ;;
          allow-empty-init)
            if [ "$${db_has_state}" = "yes" ] && [ "$${pat_exists}" = "yes" ]; then
              echo "zitadel-isolated-test-state-guard: preserved isolated-test Zitadel DB state and IAM_LOGIN_CLIENT artifact detected"
              exit 0
            fi

            if [ "$${db_has_state}" = "no" ] && [ "$${pat_exists}" = "no" ]; then
              echo "zitadel-isolated-test-state-guard: operator approved intentional empty-state isolated-test init for this run"
              exit 0
            fi

            echo "zitadel-isolated-test-state-guard: refusing isolated-test startup because the Zitadel DB state and IAM_LOGIN_CLIENT artifact are inconsistent; intentional rebuild is allowed only when both are absent together" >&2
            exit 1
            ;;
          *)
            echo "zitadel-isolated-test-state-guard: unsupported CAUPPO_ISOLATED_TEST_ZITADEL_STATE_MODE=$${CAUPPO_ISOLATED_TEST_ZITADEL_STATE_MODE}" >&2
            exit 1
            ;;
        esac
    volumes:
      - type: bind
        source: ./envs/.local/${CAUPPO_ENV_PROVENANCE}
        target: /var/run/cauppo-auth
        read_only: true
    networks:
      - cauppo-internal
    restart: "no"

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.12.3
    restart: unless-stopped
    user: "0"
    command:
      - start-from-init
      - --masterkey
      - "${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}"
    environment:
      ZITADEL_PORT: "8080"
      ZITADEL_EXTERNALDOMAIN: auth.cauppo.localhost
      ZITADEL_EXTERNALPORT: "${ZITADEL_EXTERNALPORT}"
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: ${ZITADEL_DATABASE_POSTGRES_DATABASE}
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_FIRSTINSTANCE_ORG_NAME: Cauppo
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Admin1234!
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: ${USER_SERVICE_ZITADEL_LOGIN_CLIENT_PAT_FILE}
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: zitadel-login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: ZITADEL-login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2519-04-01T08:45:00Z"
      # Login v2 feature flags
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: "${FRONTEND_VITE_AUTH_BASE_URL}/ui/v2/login"
      ZITADEL_OIDC_DEFAULTLOGINURLV2: "${FRONTEND_VITE_AUTH_BASE_URL}/ui/v2/login/login?authRequest="
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: "${FRONTEND_VITE_AUTH_BASE_URL}/ui/v2/login/logout?post_logout_redirect="
      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: "true"
    volumes:
      - type: bind
        source: ./envs/.local/${CAUPPO_ENV_PROVENANCE}
        target: /var/run/cauppo-auth
    ports:
      - "127.0.0.1:${CAUPPO_HOST_PORT_ZITADEL}:8080"
    depends_on:
      zitadel-db-ready:
        condition: service_completed_successfully
      zitadel-development-state-guard:
        condition: service_completed_successfully
      zitadel-isolated-test-state-guard:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - /app/zitadel
        - ready
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${CAUPPO_COMPOSE_INTERNAL_NETWORK}"
      - "traefik.http.routers.zitadel.rule=Host(`auth.cauppo.localhost`) && !PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.zitadel.entrypoints=web"
      - "traefik.http.routers.zitadel.priority=10"
      - "traefik.http.routers.zitadel.middlewares=secure-headers@file"
      - "traefik.http.services.zitadel.loadbalancer.server.port=8080"
      - "traefik.http.services.zitadel.loadbalancer.server.scheme=h2c"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - cauppo-internal

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.12.3
    restart: unless-stopped
    environment:
      # Route via Traefik so Host: auth.cauppo.localhost is set natively from the URL.
      # zitadel-login resolves auth.cauppo.localhost to Traefik (alias on cauppo-internal),
      # Traefik routes to Zitadel via h2c. No CUSTOM_REQUEST_HEADERS needed.
      ZITADEL_API_URL: ${FRONTEND_VITE_AUTH_BASE_URL}
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: ${USER_SERVICE_ZITADEL_LOGIN_CLIENT_PAT_FILE}
      NODE_ENV: production
    volumes:
      - type: bind
        source: ./envs/.local/${CAUPPO_ENV_PROVENANCE}
        target: /var/run/cauppo-auth
        read_only: true
    depends_on:
      traefik:
        condition: service_healthy
      zitadel:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/ui/v2/login/healthy || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${CAUPPO_COMPOSE_INTERNAL_NETWORK}"
      - "traefik.http.routers.zitadel-login.rule=Host(`auth.cauppo.localhost`) && PathPrefix(`/ui/v2/login`)"
      - "traefik.http.routers.zitadel-login.entrypoints=web"
      - "traefik.http.routers.zitadel-login.priority=20"
      # Override global entrypoint middlewares: replace secure-headers with zitadel-login-headers
      # so the Traefik CSP does not block Next.js inline scripts on the login UI.
      - "traefik.http.routers.zitadel-login.middlewares=compress@file,zitadel-login-headers@file,rate-limit@file"
      - "traefik.http.services.zitadel-login.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    networks:
      - cauppo-internal

  # Private runtime helper for Zitadel complement-token callbacks. The runtime
  # module is owned by user-service; repo-root Compose only hosts the container
  # that Zitadel calls after the operator wires the environment's preaccesstoken
  # action. user-service keeps it as a hard readiness dependency so selected-role
  # claim injection fails closed without changing the public /v1/auth/* contract.
  zitadel-complement-token-target:
    image: node:22.17.0-alpine3.22
    restart: unless-stopped
    user: "node"
    command:
      - node
      - /app/zitadel-complement-token-target.mjs
    environment:
      PORT: "8091"
      CAUPPO_SELECTED_ROLE_METADATA_KEY: cauppo.selected_role.v1
    volumes:
      - ./user-service/src/integrations/zitadel/complement-token-target.mjs:/app/zitadel-complement-token-target.mjs:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8091/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${CAUPPO_COMPOSE_INTERNAL_NETWORK}"
      - "traefik.http.routers.zitadel-complement-token-target.rule=Host(`auth.cauppo.localhost`) && PathPrefix(`/zitadel-complement-token-target`)"
      - "traefik.http.routers.zitadel-complement-token-target.entrypoints=web"
      - "traefik.http.routers.zitadel-complement-token-target.priority=25"
      - "traefik.http.routers.zitadel-complement-token-target.middlewares=zitadel-complement-token-target-strip,secure-headers@file"
      - "traefik.http.middlewares.zitadel-complement-token-target-strip.stripprefix.prefixes=/zitadel-complement-token-target"
      - "traefik.http.services.zitadel-complement-token-target.loadbalancer.server.port=8091"
    networks:
      - cauppo-internal

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${USER_SERVICE_PORT}
      NODE_ENV: ${NODE_ENV}
      CAUPPO_ENV: ${CAUPPO_ENV}
      CAUPPO_ENV_PROVENANCE: ${CAUPPO_ENV_PROVENANCE}
      CAUPPO_TEST_ENV_APPROVED: ${CAUPPO_TEST_ENV_APPROVED}
      CAUPPO_TRACE_HEADER: ${CAUPPO_TRACE_HEADER}
      DATABASE_URL: ${USER_SERVICE_DATABASE_URL}
      REDIS_URL: ${USER_SERVICE_REDIS_URL}
      RABBITMQ_URL: ${USER_SERVICE_RABBITMQ_URL}
      ZITADEL_API_URL: ${USER_SERVICE_ZITADEL_API_URL}
      ZITADEL_INTERNAL_URL: ${USER_SERVICE_ZITADEL_INTERNAL_URL}
      ZITADEL_LOGIN_CLIENT_PAT_FILE: ${USER_SERVICE_ZITADEL_LOGIN_CLIENT_PAT_FILE}
      ZITADEL_ISSUER: ${USER_SERVICE_ZITADEL_ISSUER}
      ZITADEL_ISSUER_URL: ${USER_SERVICE_ZITADEL_ISSUER_URL}
      ZITADEL_JWKS_URL: ${USER_SERVICE_ZITADEL_JWKS_URL}
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID}
      ZITADEL_SHARED_PROJECT_ID: ${ZITADEL_SHARED_PROJECT_ID}
      ZITADEL_SHARED_PROJECT_AUDIENCE: ${ZITADEL_SHARED_PROJECT_AUDIENCE}
      ZITADEL_SHARED_PROJECT_AUDIENCE_SCOPE: ${ZITADEL_SHARED_PROJECT_AUDIENCE_SCOPE}
      ZITADEL_AUDIENCE: ${USER_SERVICE_ZITADEL_AUDIENCE}
      JWT_AUDIENCE: ${USER_SERVICE_JWT_AUDIENCE}
      ZITADEL_OIDC_CLIENT_ID: ${USER_SERVICE_ZITADEL_OIDC_CLIENT_ID}
