      ZITADEL_BASE_URL: ${USER_SERVICE_ZITADEL_API_URL}
      ZITADEL_REQUEST_HOST: auth.cauppo.localhost
      ZITADEL_REQUEST_PROTO: http
      SMTP_PROVIDER_DESCRIPTION: cauppo-local-mailpit
      SMTP_HOST: mailpit:1025
      SMTP_TLS: "false"
      SMTP_SENDER_ADDRESS: ${USER_SERVICE_RESEND_FROM_EMAIL}
      SMTP_SENDER_NAME: Cauppo
      SMTP_REPLY_TO_ADDRESS: ${USER_SERVICE_RESEND_FROM_EMAIL}
      ZITADEL_LOGIN_CLIENT_ACCESS_TOKEN_FILE: /var/run/cauppo-auth/iam-login-client.${CAUPPO_ENV_PROVENANCE}.pat
      ZITADEL_ADMIN_LOGIN_NAME: admin@cauppo.auth.cauppo.localhost
      ZITADEL_ADMIN_PASSWORD: Admin1234!
      ZITADEL_MANAGEMENT_CLIENT_ID: ${USER_SERVICE_ZITADEL_MANAGEMENT_CLIENT_ID}
      ZITADEL_MANAGEMENT_CLIENT_SECRET: ${USER_SERVICE_ZITADEL_MANAGEMENT_CLIENT_SECRET}
    command:
      - /bin/sh
      - -ec
      - |
        case "$${CAUPPO_ENV_PROVENANCE}" in
          isolated-test|development)
            node /workspace/scripts/setup-mailpit-smtp.mjs
            ;;
          *)
            echo 'Skipping Zitadel Mailpit SMTP bootstrap outside isolated-test/development.'
            ;;
        esac
        touch /tmp/cauppo-init-ready
        tail -f /dev/null
    volumes:
      - type: bind
        source: ./scripts
        target: /workspace/scripts
        read_only: true
      - type: bind
        source: ./envs/.local/${CAUPPO_ENV_PROVENANCE}
        target: /var/run/cauppo-auth
        read_only: true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m
    networks:
      - cauppo-internal
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/cauppo-init-ready
      interval: 5s
      timeout: 2s
      retries: 120
      start_period: 5s
    restart: "no"

  test-env-guard:
    image: alpine:3.21
    command:
      - /bin/sh
      - -ec
      - |
        [ "$${CAUPPO_TEST_ENV_APPROVED}" = "true" ] || { echo "Rejected: compose test entrypoints require CAUPPO_TEST_ENV_APPROVED=true."; exit 1; }
        [ "$${CAUPPO_ENV}" = "test" ] || { echo "Rejected: compose test entrypoints require CAUPPO_ENV=test."; exit 1; }
        [ "$${NODE_ENV}" = "test" ] || { echo "Rejected: compose test entrypoints require NODE_ENV=test."; exit 1; }
        [ "$${CAUPPO_ENV_PROVENANCE}" = "isolated-test" ] || { echo "Rejected: compose test entrypoints require CAUPPO_ENV_PROVENANCE=isolated-test."; exit 1; }
        [ "$${FRONTEND_VITE_APP_ENV}" = "test" ] || { echo "Rejected: frontend browser entrypoints require FRONTEND_VITE_APP_ENV=test."; exit 1; }
        case "$${USER_SERVICE_DATABASE_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: USER_SERVICE_DATABASE_URL must target a _test database."; exit 1 ;; esac
        case "$${FEEDBACK_SERVICE_DATABASE_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: FEEDBACK_SERVICE_DATABASE_URL must target a _test database."; exit 1 ;; esac
        case "$${MENU_SERVICE_DATABASE_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: MENU_SERVICE_DATABASE_URL must target a _test database."; exit 1 ;; esac
        case "$${ORDER_SERVICE_DATABASE_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: ORDER_SERVICE_DATABASE_URL must target a _test database."; exit 1 ;; esac
        case "$${ANALYTICS_SERVICE_DATABASE_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: ANALYTICS_SERVICE_DATABASE_URL must target a _test database."; exit 1 ;; esac
        case "$${ANALYTICS_SERVICE_ANALYTICS_READ_REPLICA_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: ANALYTICS_SERVICE_ANALYTICS_READ_REPLICA_URL must target a _test database."; exit 1 ;; esac
    environment:
      CAUPPO_ENV: ${CAUPPO_ENV}
      NODE_ENV: ${NODE_ENV}
      CAUPPO_ENV_PROVENANCE: ${CAUPPO_ENV_PROVENANCE}
      CAUPPO_TEST_ENV_APPROVED: ${CAUPPO_TEST_ENV_APPROVED}
      USER_SERVICE_DATABASE_URL: ${USER_SERVICE_DATABASE_URL}
      FEEDBACK_SERVICE_DATABASE_URL: ${FEEDBACK_SERVICE_DATABASE_URL}
      MENU_SERVICE_DATABASE_URL: ${MENU_SERVICE_DATABASE_URL}
      ORDER_SERVICE_DATABASE_URL: ${ORDER_SERVICE_DATABASE_URL}
      ANALYTICS_SERVICE_DATABASE_URL: ${ANALYTICS_SERVICE_DATABASE_URL}
      ANALYTICS_SERVICE_ANALYTICS_READ_REPLICA_URL: ${ANALYTICS_SERVICE_ANALYTICS_READ_REPLICA_URL}
      FRONTEND_VITE_APP_ENV: ${FRONTEND_VITE_APP_ENV}
    profiles:
      - test-guard
      - sprint23-manager-proof
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_BUILD_VARS: |-
          VITE_PUBLIC_APP_URL=${FRONTEND_VITE_PUBLIC_APP_URL}
          VITE_API_BASE_URL=${FRONTEND_VITE_API_BASE_URL}
          VITE_AUTH_BASE_URL=${FRONTEND_VITE_AUTH_BASE_URL}
          VITE_WS_URL=${FRONTEND_VITE_WS_URL}
          VITE_ANALYTICS_WS_URL=${FRONTEND_VITE_ANALYTICS_WS_URL}
          VITE_ZITADEL_CLIENT_ID=${FRONTEND_VITE_ZITADEL_CLIENT_ID}
          VITE_ZITADEL_PROJECT_ID=${FRONTEND_VITE_ZITADEL_PROJECT_ID}
          VITE_ZITADEL_AUDIENCE=${FRONTEND_VITE_ZITADEL_AUDIENCE}
          VITE_ZITADEL_AUDIENCE_SCOPE=${FRONTEND_VITE_ZITADEL_AUDIENCE_SCOPE}
          VITE_TRACE_HEADER=${FRONTEND_VITE_TRACE_HEADER}
          VITE_PWA_NAME=${FRONTEND_VITE_PWA_NAME}
          VITE_PWA_SHORT_NAME=${FRONTEND_VITE_PWA_SHORT_NAME}
          VITE_APP_ENV=${FRONTEND_VITE_APP_ENV}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      CAUPPO_ENV: ${CAUPPO_ENV}
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_FRONTEND}:8080"
    depends_on:
      traefik:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`app.cauppo.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.middlewares=frontend-secure-headers@file"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
    networks:
      - cauppo-edge

networks:
  cauppo-edge:
    driver: bridge
    name: ${CAUPPO_COMPOSE_EDGE_NETWORK}
  cauppo-internal:
    driver: bridge
    name: ${CAUPPO_COMPOSE_INTERNAL_NETWORK}

volumes:
  postgres-data:
    name: ${CAUPPO_COMPOSE_POSTGRES_VOLUME}
  redis-data:
    name: ${CAUPPO_COMPOSE_REDIS_VOLUME}
  rabbitmq-data:
    name: ${CAUPPO_COMPOSE_RABBITMQ_VOLUME}
  minio-data:
    name: ${CAUPPO_COMPOSE_MINIO_VOLUME}
