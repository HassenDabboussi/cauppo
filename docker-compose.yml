        export ANALYTICS_SERVICE_JWT_AUDIENCE=\"$${ANALYTICS_SERVICE_JWT_AUDIENCE:-$$ANALYTICS_SERVICE_ZITADEL_AUDIENCE}\";
        export ZITADEL_ISSUER=\"$$ANALYTICS_SERVICE_ZITADEL_ISSUER\";
        export ZITADEL_ISSUER_URL=\"$$ANALYTICS_SERVICE_ZITADEL_ISSUER_URL\";
        export ZITADEL_JWKS_URL=\"$$ANALYTICS_SERVICE_ZITADEL_JWKS_URL\";
        export ZITADEL_AUDIENCE=\"$$ANALYTICS_SERVICE_ZITADEL_AUDIENCE\";
