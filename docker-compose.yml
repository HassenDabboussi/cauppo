    image: postgres:18.3-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${ANALYTICS_SERVICE_DATABASE_URL}
      ANALYTICS_READ_REPLICA_URL: ${ANALYTICS_SERVICE_ANALYTICS_READ_REPLICA_URL}
    entrypoint: >
      /bin/sh -c "
        set -eu;
        wait_for_connection() {
          target=\"$$1\";
          label=\"$$2\";
          attempts=0;
          until psql \"$$target\" -v ON_ERROR_STOP=1 -c 'select 1' >/dev/null 2>&1; do
            attempts=$$((attempts + 1));
            if [ \"$$attempts\" -ge 30 ]; then
              echo \"Timed out waiting for $$label\";
              exit 1;
            fi;
            echo \"Waiting for $$label ($$attempts/30)\";
            sleep 2;
          done;
        }
        found=0;
        for target in \"$$DATABASE_URL\" \"$$ANALYTICS_READ_REPLICA_URL\"; do
          if [ \"$$target\" = \"$$DATABASE_URL\" ]; then
            wait_for_connection \"$$target\" \"analytics-service primary database connection\";
          else
            wait_for_connection \"$$target\" \"analytics-service read replica connection\";
          fi;
          for migration in /migrations/*.sql; do
            [ -f \"$$migration\" ] || continue;
            found=1;
            echo \"Applying analytics-service migration $$(basename \"$$migration\") to $$target\";
            psql \"$$target\" -v ON_ERROR_STOP=1 -f \"$$migration\";
          done;
        done;
        if [ \"$$found\" -eq 0 ]; then
          echo 'analytics-service migrations missing';
          exit 1;
        fi;
        echo 'analytics-service schema initialized';
      "
    volumes:
      - ./analytics-service/migrations:/migrations:ro
    networks:
      - cauppo-internal
    restart: "no"

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${NOTIFICATION_SERVICE_PORT}
      NODE_ENV: ${NODE_ENV}
      CAUPPO_ENV: ${CAUPPO_ENV}
      CAUPPO_ENV_PROVENANCE: ${CAUPPO_ENV_PROVENANCE}
      CAUPPO_TEST_ENV_APPROVED: ${CAUPPO_TEST_ENV_APPROVED}
      CAUPPO_TRACE_HEADER: ${CAUPPO_TRACE_HEADER}
      NOTIFICATION_SERVICE_REDIS_URL: ${NOTIFICATION_SERVICE_REDIS_URL}
      REDIS_URL: ${NOTIFICATION_SERVICE_REDIS_URL}
      NOTIFICATION_SERVICE_RABBITMQ_URL: ${NOTIFICATION_SERVICE_RABBITMQ_URL}
      RABBITMQ_URL: ${NOTIFICATION_SERVICE_RABBITMQ_URL}
      ZITADEL_ISSUER: ${NOTIFICATION_SERVICE_ZITADEL_ISSUER}
      ZITADEL_ISSUER_URL: ${NOTIFICATION_SERVICE_ZITADEL_ISSUER_URL}
      ZITADEL_JWKS_URL: ${NOTIFICATION_SERVICE_ZITADEL_JWKS_URL}
      ZITADEL_AUDIENCE: ${NOTIFICATION_SERVICE_ZITADEL_AUDIENCE}
      JWT_AUDIENCE: ${NOTIFICATION_SERVICE_JWT_AUDIENCE}
      WS_HEARTBEAT_SECONDS: ${NOTIFICATION_SERVICE_WS_HEARTBEAT_SECONDS}
      WS_IDLE_TIMEOUT_SECONDS: ${NOTIFICATION_SERVICE_WS_IDLE_TIMEOUT_SECONDS}
      WS_REPLAY_TTL_MINUTES: ${NOTIFICATION_SERVICE_WS_REPLAY_TTL_MINUTES}
      WS_MAX_CONNECTIONS_PER_USER: ${NOTIFICATION_SERVICE_WS_MAX_CONNECTIONS_PER_USER}
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_NOTIFICATION_SERVICE}:8084"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:$$PORT/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.ws-headers.headers.customrequestheaders.X-Forwarded-Proto=http"
      - "traefik.http.routers.notification-service.rule=Host(`api.cauppo.localhost`) && PathPrefix(`/v1/ws`)"
      - "traefik.http.routers.notification-service.entrypoints=web"
      - "traefik.http.routers.notification-service.middlewares=ws-headers,secure-headers@file"
      - "traefik.http.services.notification-service.loadbalancer.server.port=8084"
    networks:
      - cauppo-edge
      - cauppo-internal

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_MINIO_API}:9000"
        - "127.0.0.1:${CAUPPO_HOST_PORT_MINIO_CONSOLE}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -f http://127.0.0.1:9000/minio/health/live || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${CAUPPO_COMPOSE_INTERNAL_NETWORK}"
      - "traefik.http.routers.minio-console.rule=Host(`minio.cauppo.localhost`)"
      - "traefik.http.routers.minio-console.entrypoints=web"
      - "traefik.http.routers.minio-console.middlewares=secure-headers@file"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    networks:
      - cauppo-internal

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    # Keep the helper alive after bucket creation so direct `docker compose ... up -d --wait`
    # can treat it as healthy instead of failing on an exited one-shot container.
    entrypoint: >
      /bin/sh -c "
        /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        /usr/bin/mc mb --ignore-existing local/${USER_SERVICE_R2_BUCKET_AVATARS};
        /usr/bin/mc mb --ignore-existing local/${USER_SERVICE_R2_BUCKET_RESTAURANTS};
        /usr/bin/mc mb --ignore-existing local/${USER_SERVICE_R2_BUCKET_NAME};
        /usr/bin/mc mb --ignore-existing local/${MENU_SERVICE_R2_BUCKET_MENU_ITEMS};
        /usr/bin/mc mb --ignore-existing local/${MENU_SERVICE_R2_BUCKET_QR};
        /usr/bin/mc anonymous set download local/${USER_SERVICE_R2_BUCKET_AVATARS};
        /usr/bin/mc anonymous set download local/${MENU_SERVICE_R2_BUCKET_MENU_ITEMS};
        /usr/bin/mc anonymous set download local/${MENU_SERVICE_R2_BUCKET_QR};
        echo 'MinIO buckets initialized';
        touch /tmp/minio-init-ready;
        tail -f /dev/null;
      "
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/minio-init-ready
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - cauppo-internal
    restart: "no"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_UI_AUTH: mailpit:cauppo-mailpit
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_MAILPIT_SMTP}:1025"
        - "127.0.0.1:${CAUPPO_HOST_PORT_MAILPIT_WEB}:8025"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8025/livez || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64m
    networks:
      - cauppo-edge
      - cauppo-internal

  test-env-guard:
    image: alpine:3.21
    command:
      - /bin/sh
      - -ec
      - |
        [ "$${CAUPPO_TEST_ENV_APPROVED}" = "true" ] || { echo "Rejected: compose test entrypoints require CAUPPO_TEST_ENV_APPROVED=true."; exit 1; }
        [ "$${CAUPPO_ENV}" = "test" ] || { echo "Rejected: compose test entrypoints require CAUPPO_ENV=test."; exit 1; }
        [ "$${NODE_ENV}" = "test" ] || { echo "Rejected: compose test entrypoints require NODE_ENV=test."; exit 1; }
        [ "$${CAUPPO_ENV_PROVENANCE}" = "isolated-test" ] || { echo "Rejected: compose test entrypoints require CAUPPO_ENV_PROVENANCE=isolated-test."; exit 1; }
        [ "$${FRONTEND_VITE_APP_ENV}" = "test" ] || { echo "Rejected: frontend browser entrypoints require FRONTEND_VITE_APP_ENV=test."; exit 1; }
        case "$${USER_SERVICE_DATABASE_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: USER_SERVICE_DATABASE_URL must target a _test database."; exit 1 ;; esac
        case "$${FEEDBACK_SERVICE_DATABASE_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: FEEDBACK_SERVICE_DATABASE_URL must target a _test database."; exit 1 ;; esac
        case "$${MENU_SERVICE_DATABASE_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: MENU_SERVICE_DATABASE_URL must target a _test database."; exit 1 ;; esac
        case "$${ORDER_SERVICE_DATABASE_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: ORDER_SERVICE_DATABASE_URL must target a _test database."; exit 1 ;; esac
        case "$${ANALYTICS_SERVICE_DATABASE_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: ANALYTICS_SERVICE_DATABASE_URL must target a _test database."; exit 1 ;; esac
        case "$${ANALYTICS_SERVICE_ANALYTICS_READ_REPLICA_URL}" in *_test|*_test\?*) ;; *) echo "Rejected: ANALYTICS_SERVICE_ANALYTICS_READ_REPLICA_URL must target a _test database."; exit 1 ;; esac
    environment:
      CAUPPO_ENV: ${CAUPPO_ENV}
      NODE_ENV: ${NODE_ENV}
      CAUPPO_ENV_PROVENANCE: ${CAUPPO_ENV_PROVENANCE}
      CAUPPO_TEST_ENV_APPROVED: ${CAUPPO_TEST_ENV_APPROVED}
      USER_SERVICE_DATABASE_URL: ${USER_SERVICE_DATABASE_URL}
      FEEDBACK_SERVICE_DATABASE_URL: ${FEEDBACK_SERVICE_DATABASE_URL}
      MENU_SERVICE_DATABASE_URL: ${MENU_SERVICE_DATABASE_URL}
      ORDER_SERVICE_DATABASE_URL: ${ORDER_SERVICE_DATABASE_URL}
      ANALYTICS_SERVICE_DATABASE_URL: ${ANALYTICS_SERVICE_DATABASE_URL}
      ANALYTICS_SERVICE_ANALYTICS_READ_REPLICA_URL: ${ANALYTICS_SERVICE_ANALYTICS_READ_REPLICA_URL}
      FRONTEND_VITE_APP_ENV: ${FRONTEND_VITE_APP_ENV}
    profiles:
      - test-guard
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_BUILD_VARS: |-
          VITE_PUBLIC_APP_URL=${FRONTEND_VITE_PUBLIC_APP_URL}
          VITE_API_BASE_URL=${FRONTEND_VITE_API_BASE_URL}
          VITE_AUTH_BASE_URL=${FRONTEND_VITE_AUTH_BASE_URL}
          VITE_WS_URL=${FRONTEND_VITE_WS_URL}
          VITE_ANALYTICS_WS_URL=${FRONTEND_VITE_ANALYTICS_WS_URL}
          VITE_ZITADEL_CLIENT_ID=${FRONTEND_VITE_ZITADEL_CLIENT_ID}
          VITE_ZITADEL_PROJECT_ID=${FRONTEND_VITE_ZITADEL_PROJECT_ID}
          VITE_ZITADEL_AUDIENCE=${FRONTEND_VITE_ZITADEL_AUDIENCE}
          VITE_ZITADEL_AUDIENCE_SCOPE=${FRONTEND_VITE_ZITADEL_AUDIENCE_SCOPE}
          VITE_TRACE_HEADER=${FRONTEND_VITE_TRACE_HEADER}
          VITE_PWA_NAME=${FRONTEND_VITE_PWA_NAME}
          VITE_PWA_SHORT_NAME=${FRONTEND_VITE_PWA_SHORT_NAME}
          VITE_APP_ENV=${FRONTEND_VITE_APP_ENV}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      CAUPPO_ENV: ${CAUPPO_ENV}
    ports:
        - "127.0.0.1:${CAUPPO_HOST_PORT_FRONTEND}:8080"
    depends_on:
      traefik:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`app.cauppo.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.middlewares=secure-headers@file"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
    networks:
      - cauppo-edge

networks:
  cauppo-edge:
    driver: bridge
    name: ${CAUPPO_COMPOSE_EDGE_NETWORK}
  cauppo-internal:
    driver: bridge
    name: ${CAUPPO_COMPOSE_INTERNAL_NETWORK}

volumes:
  postgres-data:
    name: ${CAUPPO_COMPOSE_POSTGRES_VOLUME}
  redis-data:
    name: ${CAUPPO_COMPOSE_REDIS_VOLUME}
  rabbitmq-data:
    name: ${CAUPPO_COMPOSE_RABBITMQ_VOLUME}
  minio-data:
    name: ${CAUPPO_COMPOSE_MINIO_VOLUME}
