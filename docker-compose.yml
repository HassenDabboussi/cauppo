      /bin/sh -ec "
        mkdir -p /workspace/feedback-service;
          tar -C /source -cf - package.json bun.lock bunfig.toml tsconfig.json drizzle.config.ts src drizzle | tar -C /workspace/feedback-service -xf -;
        bun install;
        bun run db:init;
        echo 'feedback-service schema initialized';
        touch /tmp/cauppo-init-ready;
        tail -f /dev/null;
      "
    volumes:
      - ./feedback-service:/source:ro
    networks:
      - cauppo-internal
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/cauppo-init-ready
      interval: 5s
      timeout: 2s
      retries: 120
      start_period: 5s
    restart: "no"

