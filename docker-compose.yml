    restart: unless-stopped
    command: >
      /bin/sh -ec "
        export ANALYTICS_SERVICE_ZITADEL_ISSUER=\"$${ANALYTICS_SERVICE_ZITADEL_ISSUER_URL:-$${ANALYTICS_SERVICE_ZITADEL_ISSUER:-$${USER_SERVICE_ZITADEL_ISSUER_URL:-$${USER_SERVICE_ZITADEL_ISSUER:-}}}}\";
        export ANALYTICS_SERVICE_ZITADEL_ISSUER_URL=\"$$ANALYTICS_SERVICE_ZITADEL_ISSUER\";
        export ANALYTICS_SERVICE_ZITADEL_JWKS_URL=\"$${ANALYTICS_SERVICE_ZITADEL_JWKS_URL:-$${USER_SERVICE_ZITADEL_JWKS_URL:-}}\";
